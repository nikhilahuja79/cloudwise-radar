name: FinOps Policy Scan

on:
  pull_request:
    paths:
      - "infra/**"
      - "policies/**"
      - "scripts/**"
      - ".github/workflows/finops-scan.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "policies/**"
      - "scripts/**"
      - ".github/workflows/finops-scan.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  finops-scan:
    name: FinOps Policy Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scanner dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Run FinOps scanner
        continue-on-error: true
        run: python scripts/finops_scan.py

      - name: Generate AI-style recommendations
        if: always()
        env:
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/ai_recommend.py
      - name: Upload FinOps outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
            name: finops-ai-recommendations
            path: outputs/

      - name: Publish results to API data
        if: always() && github.event_name == 'push'
        run: |
          mkdir -p api/data
          cp outputs/finops-findings.json api/data/finops-findings.json
          cp outputs/ai-recommendations.json api/data/ai-recommendations.json

      - name: Commit updated API data
        id: commit
        if: always() && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/data
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh FinOps scan data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger dashboard redeploy
        if: always() && github.event_name == 'push' && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "Azure Static Web Apps CI/CD" --repo ${{ github.repository }} --ref main