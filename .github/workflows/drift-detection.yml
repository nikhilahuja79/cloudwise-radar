name: Terraform Drift Detection

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  drift-detection:
    name: Detect Terraform Drift
    runs-on: ubuntu-latest
    
    env:
        ARM_USE_OIDC: true
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    
    defaults:
      run:
        working-directory: infra/envs/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init
        run: terraform init

      - name: Terraform plan drift check
        id: plan
        continue-on-error: true
        run: terraform plan -detailed-exitcode -no-color

      - name: Create issue when drift is detected
        if: steps.plan.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Terraform drift detected in Azure dev environment";
            const body = [
              "Terraform detected drift or a failed plan in `infra/envs/dev`.",
              "",
              "Please inspect the failed GitHub Actions run, compare Azure resources with Terraform code, and decide whether to:",
              "",
              "- update Terraform code,",
              "- import the changed resource, or",
              "- revert the manual Azure change.",
              "",
              `Run URL: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["drift", "terraform", "devops"]
            });