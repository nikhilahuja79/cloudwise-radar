name: Terraform Drift Detection

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  issues: write

jobs:
  drift-detection:
    name: Detect Terraform Drift
    runs-on: ubuntu-latest
    
    env:
        ARM_USE_OIDC: true
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    
    defaults:
      run:
        working-directory: infra/envs/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init
        run: terraform init

      - name: Terraform plan drift check
        id: plan
        continue-on-error: true
        run: terraform plan -detailed-exitcode -no-color

      - name: Create issue when drift is detected
        if: steps.plan.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Terraform drift detected in Azure dev environment";
            const body = [
              "Terraform detected drift or a failed plan in `infra/envs/dev`.",
              "",
              "Please inspect the failed GitHub Actions run, compare Azure resources with Terraform code, and decide whether to:",
              "",
              "- update Terraform code,",
              "- import the changed resource, or",
              "- revert the manual Azure change.",
              "",
              `Run URL: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["drift", "terraform", "devops"]
            });

      - name: Write drift findings output
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p outputs
          if [ "${{ steps.plan.outcome }}" = "failure" ]; then
            cat > outputs/drift-findings.json <<EOF
          [
            {
              "resource": "infra/envs/dev",
              "status": "drift_detected",
              "detected_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
          ]
          EOF
          else
            echo "[]" > outputs/drift-findings.json
          fi

      - name: Publish drift findings to API data
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p api/data
          cp outputs/drift-findings.json api/data/drift-findings.json

      - name: Commit updated drift data
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/data/drift-findings.json
          git diff --staged --quiet || git commit -m "chore: refresh drift detection data"
          git push